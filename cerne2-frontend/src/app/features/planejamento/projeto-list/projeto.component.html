<div class="container">
  <button class="btn-back" (click)="voltar()">← Planejamentos</button>

  <div class="page-header">
    <h1 class="page-title">Projetos{{ planejamentoNome ? ' — ' + planejamentoNome : '' }}</h1>
    <button *ngIf="!modoAvaliacao" class="btn-primary" (click)="novo()">+ Novo Projeto</button>
  </div>

  <div class="lista">
    <div class="empty-state" *ngIf="erroCarregamento" style="color: #c0392b;">{{ erroCarregamento }}</div>

    <div class="card" *ngFor="let p of projetos">
      <div class="card-body" (click)="abrirObjetivos(p.prjCod!)">
        <div>
          <div class="card-title">{{ p.nome }}</div>
          <div class="card-dates">{{ p.dataInicio | date:'dd/MM/yyyy' }} — {{ p.dataTermino | date:'dd/MM/yyyy' }}</div>
        </div>
        <span class="card-nav">Objetivos →</span>
      </div>
      <div class="card-actions" *ngIf="!modoAvaliacao">
        <button class="btn-action btn-edit" (click)="editar(p.prjCod!)">Editar</button>
        <button class="btn-action btn-delete" (click)="deletar(p.prjCod!)">Excluir</button>
      </div>
    </div>

    <div class="empty-state" *ngIf="projetos.length === 0">
      Nenhum projeto cadastrado.
    </div>
  </div>
</div>
