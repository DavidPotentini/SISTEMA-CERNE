<div class="container">
  <button class="btn-back" (click)="voltar()">← Objetivos</button>

  <div class="page-header">
    <h1 class="page-title">Tarefas{{ objetivoNome ? ' — ' + objetivoNome : '' }}</h1>
    <button *ngIf="!modoAvaliacao" class="btn-primary" (click)="novo()">+ Nova Tarefa</button>
  </div>

  <div class="lista">
    <div class="empty-state" *ngIf="erroCarregamento" style="color: #c0392b;">{{ erroCarregamento }}</div>

    <div class="card" *ngFor="let t of tarefas">
      <div class="card-body" (click)="editar(t.trfCod!)">
        <div>
          <div class="card-title">{{ t.nome }}</div>
          <div class="card-dates">{{ t.dataInicio | date:'dd/MM/yyyy' }} — {{ t.dataTermino | date:'dd/MM/yyyy' }}</div>
        </div>
        <span class="badge" [ngClass]="'badge-' + t.eSituacaoTarefa">{{ situacaoLabel(t.eSituacaoTarefa) }}</span>
      </div>
      <div class="card-actions">
        <button class="btn-action btn-edit" (click)="editar(t.trfCod!)">
          {{ modoAvaliacao ? 'Avaliar' : 'Editar' }}
        </button>
        <button *ngIf="!modoAvaliacao" class="btn-action btn-delete" (click)="deletar(t.trfCod!)">Excluir</button>
      </div>
    </div>

    <div class="empty-state" *ngIf="tarefas.length === 0">
      Nenhuma tarefa cadastrada.
    </div>
  </div>
</div>
