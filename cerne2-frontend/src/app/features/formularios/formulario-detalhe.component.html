<div class="toast" *ngIf="toast" [class.toast-sucesso]="toast.tipo === 'sucesso'" [class.toast-erro]="toast.tipo === 'erro'">
  {{ toast.texto }}
</div>

<div class="container">
  <header class="page-header">
    <button type="button" class="btn-back" (click)="voltar()">← Voltar</button>
    <h1>{{ isNovo ? 'Novo Formulário' : 'Editar Formulário' }}</h1>
  </header>

  <form class="form-card" (ngSubmit)="salvar()">
    <div class="form-group">
      <label for="nome">Nome</label>
      <input
        id="nome"
        type="text"
        [(ngModel)]="form.nome"
        name="nome"
        placeholder="Ex.: Formulário de avaliação 2026"
        required
      >
    </div>

    <div class="form-group">
      <label for="proposito">Propósito</label>
      <input
        id="proposito"
        type="text"
        [(ngModel)]="form.proposito"
        name="proposito"
        placeholder="Ex.: Coletar feedback dos incubados"
      >
    </div>

    <div class="form-group">
      <app-formulario-campos-editor [campos]="campos"></app-formulario-campos-editor>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-success">
        {{ isNovo ? 'Salvar' : 'Atualizar' }}
      </button>

      <button
        *ngIf="!isNovo"
        type="button"
        class="btn btn-danger"
        (click)="deletar()"
      >
        Excluir formulário
      </button>
    </div>
  </form>
</div>
