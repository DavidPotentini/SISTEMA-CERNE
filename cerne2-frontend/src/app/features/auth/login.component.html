<div class="auth-page">
  <div class="auth-card">
    <header class="auth-header">
      <h1>CERNE</h1>
      <p>Acesse sua conta</p>
    </header>

    <form (ngSubmit)="entrar()">
      <div class="form-group">
        <label for="empresa">Empresa</label>
        <select id="empresa" name="empresa" [(ngModel)]="tntCod" required>
          <option [ngValue]="null" disabled>Selecione a empresa</option>
          <option *ngFor="let e of empresas" [ngValue]="e.tntCod">{{ e.nomeEmpresa }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="seu@email.com"
          required
        >
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          id="senha"
          type="password"
          name="senha"
          [(ngModel)]="senha"
          placeholder="••••••••"
          required
        >
      </div>

      <button type="submit" class="btn btn-primary btn-block" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-foot">
      Não tem conta? <a routerLink="/cadastro">Cadastre-se</a>
    </p>
  </div>

  <div
    class="toast"
    *ngIf="toast"
    [class.toast-sucesso]="toast.tipo === 'sucesso'"
    [class.toast-erro]="toast.tipo === 'erro'"
  >
    {{ toast.texto }}
  </div>
</div>
