spring:

  application:
    name: cerne2

  datasource:
    url: jdbc:postgresql://localhost:5432/cerne
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  jpa:
    open-in-view: false #opção true tem EntityManager próprio que impede a abertura de outros EntityManager e a troca de esquema
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

storage:
  endpoint: http://localhost:9000
  bucket: cerne2-documentos
  access-key: minioadmin
  secret-key: minioadmin123
  region: us-east-1

app:
  jwt:
    # Em prod, sobrescrever via env var JWT_SECRET com uma chave Base64 de >= 256 bits.
    secret: ${JWT_SECRET:Y2VybmUyLWRldi1zZWNyZXQta2V5LXRyb2N1ZS1lbS1wcm9kLW1pbi0zMi1ieXRlcw==}
    expiracao-min: 480


    #hibernate:
      #ddl-auto: update

